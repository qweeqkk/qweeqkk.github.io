		<script>
			var ytApiKey = "";

			defaultID = "KzINIG0OmM4";
			defaultIDs = ["KzINIG0OmM4", "KzINIG0OmM4", "KzINIG0OmM4"];

			function RandomID() {
				defaultID = defaultIDs[Math.floor(Math.random() * defaultIDs.length)];
			}

			// 2. This code loads the IFrame Player API code asynchronously.
			var tag = document.createElement("script");

			tag.src = "https://www.youtube.com/iframe_api?app=desktop&cc_load_policy=3&iv_load_policy=3";
			var firstScriptTag = document.getElementsByTagName("script")[0];
			firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

			// 3. This function creates an <iframe> (and YouTube player)
			//    after the API code downloads.
			var player;
			// var checkplayer;
			function onYouTubeIframeAPIReady() {
				player = new YT.Player("player", {
					events: {
						onReady: onPlayerReady,
						onStateChange: onPlayerStateChange,
					},
				});
				// checkplayer = new YT.Player("checkplayer", {});

				// RandomID();
				// player.loadVideoById(defaultID, 0);
				// player = new YT.Player("player", {
				//   height: "100%",
				//   width: "100%",
				//   videoId: defaultID,
				//   playerVars: {},
				//   events: {
				//     onReady: onPlayerReady,
				//     onStateChange: onPlayerStateChange,
				//   },
				// });
				// checkplayer = new YT.Player("checkplayer", {
				//   height: "50%",
				//   width: "50%",
				//   videoId: defaultID,
				//   playerVars: {},
				//   events: {},
				// });
			}

			$("#player").attr("referrerpolicy", "strict-origin-when-cross-origin");

			var playerready = false;
			// 4. The API will call this function when the video player is ready.
			function onPlayerReady(event) {
				// StartVideo();
				// event.target.playVideo();
				playerready = true;
			}

			var saveready = false;

			// 5. The API calls this function when the player's state changes.
			//    The function indicates that when playing a video (state=1),
			//    the player should play for six seconds and then stop.
			function onPlayerStateChange(event) {
				document.querySelector("#nowplaying").textContent = player.getVideoData().title;

				SetTitle();

				document.querySelector("#nowplayingno").textContent = "No. " + (currentVideo + 1);

				// document.querySelector("#current").textContent = event.data;

				if (event.data == 0) {
					Next();
				}
				if (event.data == 1) {
					dontplay = false;
				}
				if (event.data == 2 && saveready) {
					Save(true);
				}

				// try {
				// 	// Disable captions completelly
				// 	player.unloadModule("captions");
				// 	player.unloadModule("cc");
				// } catch (exception) {}
			}

			currentVideo = 0;

			function SetTitle() {
				doctitle = "B▶ ";

				playlisttitle = document.getElementById("playlisttitle").value;
				if (playlisttitle != "") {
					doctitle = "";
					// doctitle += " (" + (currentVideo + 1) + "/" + count + ")";
					doctitle +=
						"B【" +
						playlisttitle +
						"】 ▶  (" +
						(currentVideo + 1) +
						"/" +
						count +
						") ";
					// doctitle += " ▶ ";
				}

				// videoID = document.getElementById("videoIDInput" + currentVideo).value;
				// videoTitle = "";
				// console.log(videoID);
				// $.get(
				//   "https://www.googleapis.com/youtube/v3/videos?part=snippet&id=" +
				//     videoID +
				//     "&key=" +
				//     ytApiKey,
				//   function (data) {
				//     // alert(data.items[0].snippet.title);
				//     videoTitle = data.items[0].snippet.title;
				//     doctitle += videoTitle;
				//   }
				// );
				// console.log(videoTitle);

				if (player.getVideoData()) {
					doctitle += player.getVideoData().title;
				}

				document.title = doctitle;
			}

			function StartVideo(vid = currentVideo, save = true, starttime = 0) {
				CheckVideoLinks();

				if (
					document.getElementById("inputName" + vid).value == "..." ||
					document.getElementById("inputName" + vid).value == "<checking>" ||
					document.getElementById("inputName" + vid).value == ""
				) {
					ReCheck(vid);
				}

				$(".ibutton").blur();

				if (vid <= last) {
					videoID = document.getElementById("videoIDInput" + vid).value;
					// document.querySelector("#current").textContent = vid;

					$("#inputBlock" + currentVideo).removeClass("nowplaying");
					currentVideo = vid;
					$("#inputBlock" + currentVideo).addClass("nowplaying");

					if (videoID.length > 10) {
						// if (dontplay) {
						//   setTimeout(() => {
						//     player.pauseVideo();
						//     PauseToggle(true);
						//   }, 1000);
						// }
						if (!dontplay) {
							player.loadVideoById(videoID, starttime);
							player.seekTo(starttime);
							player.playVideo();
						} else {
							player.cueVideoById(videoID, starttime);
						}
					} else {
						player.cueVideoById(RandomID());
					}
				} else {
					StartVideo(0, false);
					player.stopVideo();
				}

				if (save) {
					Save();
				}

				setTimeout(() => {
					saveready = true;
				}, 1000);
			}

			$(document).ready(function () {
				window.addEventListener("load", (event) => {
					Load();
				});

				document.body.onkeyup = function (e) {
					if (e.key == " " || e.code == "Space" || e.keyCode == 32) {
						if (player.getPlayerState() == 1) {
							player.pauseVideo();
						} else if (player.getPlayerState() == 2) {
							player.playVideo();
						}
					} else if (e.key === "ArrowLeft" || e.code == "ArrowLeft" || e.keyCode == 37) {
						if (e.ctrlKey) {
							player.seekTo(player.getCurrentTime() - 1);
						} else {
							player.seekTo(player.getCurrentTime() - 5);
						}
					} else if (
						e.key === "ArrowRight" ||
						e.code == "ArrowRight" ||
						e.keyCode == 39
					) {
						if (e.ctrlKey) {
							player.seekTo(player.getCurrentTime() + 1);
						} else {
							player.seekTo(player.getCurrentTime() + 5);
						}
					} else if (e.key === "," || e.code == "Comma" || e.keyCode == 188) {
						player.seekTo(player.getCurrentTime() - 1 / 30);
					} else if (e.key === "." || e.code == "Period" || e.keyCode == 190) {
						player.seekTo(player.getCurrentTime() + 1 / 30);
					} else if (e.key === "ArrowUp" || e.code == "ArrowUp" || e.keyCode == 38) {
						if (e.ctrlKey) {
							player.setVolume(player.getVolume() + 1);
						} else {
							player.setVolume(player.getVolume() + 10);
						}
					} else if (e.key === "ArrowDown" || e.code == "ArrowDown" || e.keyCode == 40) {
						if (e.ctrlKey) {
							player.setVolume(player.getVolume() - 1);
						} else {
							player.setVolume(player.getVolume() - 10);
						}
					}
				};
			});

			let countdowninputbox = document.getElementById("setcountdown");
			countdowninputbox.addEventListener("keydown", (e) => {
				if (e.key === "Enter") SetCountdown();
			});

			var nextSegMins = 0;

			function SetCountdown() {
				const inputString = document.getElementById("setcountdown").value;
				const myArray = inputString.split(":");

				var inputMinutes = 0;
				var inputHours = 0;

				if (inputString.indexOf(":") !== -1) {
					inputHours = parseInt(myArray[0]);
					inputMinutes = parseInt(myArray[1]);
				} else if (parseInt(myArray[0]) > 23) inputMinutes = parseInt(myArray[0]);
				else inputHours = parseInt(myArray[0]);

				if (Number.isNaN(inputHours)) inputHours = 0;
				if (Number.isNaN(inputMinutes)) inputMinutes = 0;

				const today = new Date();
				const hours = today.getHours();
				const minutes = today.getMinutes();

				var outputHours = inputHours + hours;
				var outputMinutes = inputMinutes + minutes;

				console.log("hours " + hours);
				console.log("minutes " + minutes);
				console.log("inputString " + inputString);
				console.log("myArray " + myArray);
				console.log("inputHours " + inputHours);
				console.log("inputMinutes " + inputMinutes);
				console.log("outputHours " + outputHours);
				console.log("outputMinutes " + outputMinutes);

				while (outputMinutes >= 60) {
					outputMinutes -= 60;
					outputHours += 1;
				}
				if (outputHours >= 24) outputHours -= 24;

				nextSegHr = outputHours;
				nextSegMins = outputMinutes;

				console.log("nextSegHr " + nextSegHr);
				console.log("nextSegMins " + nextSegMins);

				if (!clockActive) {
					clockActive = true;
					Clock();
				}

				Save(true);
			}

			function Clock() {
				const today = new Date();

				// get time components
				const hours = today.getHours();
				const minutes = today.getMinutes();
				const seconds = today.getSeconds();

				//add '0' to hour, minute & second when they are less 10
				const hour24With0 = hours < 10 ? "0" + hours : hours;
				const minutesWith0 = minutes < 10 ? "0" + minutes : minutes;
				const secondsWith0 = seconds < 10 ? "0" + seconds : seconds;

				const currentTime = hour24With0 + ":" + minutesWith0 + ":" + secondsWith0;
				const nextSegWith0 = nextSegHr < 10 ? "0" + nextSegHr : nextSegHr;
				const nextSegMinsWith0 = nextSegMins < 10 ? "0" + nextSegMins : nextSegMins;
				var segmentEnd = nextSegWith0 + ":" + nextSegMinsWith0; // ":00";
				document.getElementById("nextSegment").innerHTML = segmentEnd;

				// console.log("hours " + hours);
				// console.log("minutes " + minutes);
				// console.log("hour24With0 " + hour24With0);
				// console.log("minutesWith0 " + minutesWith0);
				// console.log("currentTime " + currentTime);
				// console.log("nextSegHr " + nextSegHr);
				// console.log("nextSegMins " + nextSegMins);
				// console.log("segmentEnd " + segmentEnd);

				var startDate = new Date("1/1/1900 " + currentTime);
				var endDate = new Date("1/1/1900 " + segmentEnd);
				var countdownTime_ms = endDate - startDate; //diff in milliseconds
				if (countdownTime_ms < 0) {
					countdownTime_ms += 86400000; //correct for across days
				}

				// console.log("countdownTime_ms " + countdownTime_ms);

				var countdown = new Date(countdownTime_ms).toISOString().slice(11, 19);
				document.getElementById("countdown").innerHTML = countdown;

				if (countdownTime_ms >= 86340000) {
					player.pauseVideo();
					clockActive = false;
					document.getElementById("nextSegment").innerHTML = "segmentEnd";
					document.getElementById("countdown").innerHTML = "countdown";
				}

				// var percent = (14400000 - countdownTime_ms) / 144000;
				// document.getElementById("segmentProgress").innerHTML =
				//   Math.round(percent * 100) / 100 + "% through segment";

				// $("#hourX").css("top", percent + "%");
				// $("#progressBar").css("height", percent + "%");
				// $("#progressBarBar").css("top", percent + "%");
				if (clockActive) setTimeout(Clock, 1000);
			}

			function ShiftInputs(from = 0, next = true) {
				$(".ibutton").blur();

				if (next == true) {
					if (last > 0) {
						for (let i = from; i < last; i++) {
							j = i;
							document.getElementById("videoIDInput" + j).value =
								document.getElementById("videoIDInput" + (j + 1)).value;
						}
						for (let i = from; i < last; i++) {
							j = i;
							document.querySelector("#inputName" + j).value =
								document.querySelector("#inputName" + (j + 1)).value;
						}

						$("#inputBlock" + last).remove();
						count -= 1;
						last = count - 1;

						if (from < currentVideo) {
							ShiftNowPlaying(false);
						} else if (from == currentVideo) {
							StartVideo();
						}
					} else {
						document.getElementById("videoIDInput" + 0).value = "";
						document.querySelector("#inputName" + 0).value = "";
						StartVideo(0, false);
					}
				} else {
					Add();
					for (let i = from; i < last; i++) {
						j = last + from - i;
						document.getElementById("videoIDInput" + j).value =
							document.getElementById("videoIDInput" + (j - 1)).value;
					}
					document.getElementById("videoIDInput" + from).value = "";

					for (let i = from; i < last; i++) {
						j = last + from - i;
						document.querySelector("#inputName" + j).value = document.querySelector(
							"#inputName" + (j - 1),
						).value;
					}
					document.querySelector("#inputName" + from).value = "";

					if (from <= currentVideo) {
						ShiftNowPlaying();
					}
				}

				if (ischecking) {
					CheckArrayAdd(from);
					CheckArrayAdd(from + 1);
					CheckArrayAdd(checking - 1);
					CheckArrayAdd(checking);
					CheckArrayAdd(checking + 1);
				}

				Report();
			}

			function CheckPlaylistLink(set = 0, playlistID = "", invert = false, pageToken = "") {

						RestartCheck();

			function GetDuration(vid = 0) {
				document.querySelector("#durationMarker" + vid).textContent = "...";

					"https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=" +
						videoID +
						"&key=" +
						ytApiKey,
					function (data) {
						videoDuration = data.items[0].contentDetails.duration;

						videoDuration = videoDuration.replaceAll("PT", "");
						hindex = videoDuration.indexOf("H");
						mindex = videoDuration.indexOf("M");
						sindex = videoDuration.indexOf("S");
						stime = 0;
						mtime = 0;
						htime = 0;

						if (sindex > 0) {
							stime = videoDuration.substring(
								Math.max(hindex, mindex) + 1,
								sindex,
							);
							// videoDuration = videoDuration.replaceAll(stime + "S", "");
						}
						if (mindex > 0) {
							mtime = videoDuration.substring(Math.max(hindex) + 1, mindex);
							// videoDuration = videoDuration.replaceAll(mtime + "M", "");
						}
						if (hindex > 0) {
							htime = videoDuration.substring(0, hindex);
							// videoDuration = videoDuration.replaceAll(htime + "H", "");
						}

						document.querySelector("#durationMarker" + vid).textContent =
							htime + ":" + LeadingZero(mtime) + ":" + LeadingZero(stime);
					},
				);
			}

			function LeadingZero(number = "") {
				if (number.length == 2) {
					return number;
				}
				if (number.length == 1) {
					return "0" + number;
				}
				if (number.length == 0) {
					return "00";
				}
				return "00";
			}

			function SetText() {
				settext = document.getElementById("settext").value;
				document.querySelector("#settextt").textContent = settext;
			}

			function Save(overwrite = false) {
				CheckVideoLinks();
				SetTitle();

				const urlParams = new URLSearchParams(window.location.search);

				oldtime = 0;
				if (urlParams.has("time")) {
					oldtime = parseInt(urlParams.get("time"));
				}

				tttttime = Math.trunc(player.getCurrentTime());
				if (Number.isNaN(tttttime)) {
					currenttime = oldtime;
					console.log("not a number");
				} else if (tttttime == null) {
					currenttime = oldtime;
					console.log("null");
				} else {
					currenttime = tttttime;
					// currenttime = "im a frog";
				}

				querystring = "?";
				querystring += "apikey=" + ytApiKey + "&";
				querystring += "startcount=" + count + "&";
				querystring += "nowplaying=" + currentVideo + "&";
				querystring += "time=" + currenttime + "&";

				if (clockActive) {
					querystring += "clock=true" + "&";
					querystring += "endh=" + nextSegHr + "&";
					querystring += "endm=" + nextSegMins + "&";
				}

				playlisttitle = document.getElementById("playlisttitle").value;
				if (playlisttitle != "") {
					querystring += "playlist=" + encodeURIComponent(playlisttitle) + "&";
				}

				if (loop) {
					querystring += "loop=true" + "&";
				}

				if (mirror) {
					querystring += "mirror=true" + "&";
				}

				for (let i = 0; i < count; i++) {
					j = i;

					if (document.getElementById("videoIDInput" + j).value != "") {
						querystring +=
							"in" +
							j +
							"=" +
							document.getElementById("videoIDInput" + j).value +
							"&";
					}
				}

				for (let i = 0; i < count; i++) {
					j = i;

					if (document.getElementById("videoIDInput" + j).value != "") {
						if (
							document.getElementById("inputName" + j).value != "..." &&
							document.getElementById("inputName" + j).value !=
								"<checking>" &&
							document.getElementById("inputName" + j).value != ""
						) {
							querystring +=
								"intitle" +
								j +
								"=" +
								encodeURIComponent(
									document.getElementById("inputName" + j).value,
								) +
								"&";
						}
					}
				}

				// querystring += "interval=" + interval + "&";

				var currenttime = 0;

				// document.querySelector("#inputName3").value = urlParams;
				// document.querySelector("#inputName4").value = querystring.slice(1, -1);
				if (querystring.slice(1, -1) == urlParams) {
					return;
				}

				if (overwrite) {
					window.history.replaceState(null, null, querystring);
				} else {
					window.history.pushState(null, null, querystring);
				}
			}

			window.addEventListener("popstate", function (event) {
				Load();
			});

			startxtime = 0;
			function Load() {
				const urlParams = new URLSearchParams(window.location.search);

				$("div").remove(".ofc");

				count = 0;
				last = count - 1;

				if (urlParams.has("apikey") == true) {
					ytApiKey = urlParams.get("apikey");
				}

				console.log("ytApiKey" + ytApiKey);

				if (urlParams.has("startcount") == true) {
					startcount = urlParams.get("startcount");
					InitInputs(startcount);
				} else {
					InitInputs();
				}

				if (urlParams.has("clock") == true) {
					clockActive = urlParams.get("clock");
					nextSegHr = parseInt(urlParams.get("endh"));
					nextSegMins = parseInt(urlParams.get("endm"));
					Clock();
				}

				if (urlParams.has("nowplaying") == true) {
					currentVideo = parseInt(urlParams.get("nowplaying"));
				}
				if (urlParams.has("loop") == true) {
					loop = urlParams.get("loop");
					LoopToggle(true, loop);
				}
				if (urlParams.has("mirror") == true) {
					mirror = urlParams.get("mirror");
					MirrorToggle(true, loop);
				}

				if (urlParams.has("time") == true) {
					startxtime = parseInt(urlParams.get("time"));
				}

				// if (urlParams.has("interval") == true) {
				//   interval = urlParams.get("interval");
				// }
				// document.getElementById("interval").value = interval;

				if (urlParams.has("playlist") == true) {
					playlisttitle = urlParams.get("playlist");
					document.getElementById("playlisttitle").value = playlisttitle;
				}

				if (urlParams.has("in0") == true) {
					for (let i = 0; i < count; i++) {
						j = i;
						document.getElementById("videoIDInput" + j).value = urlParams.get(
							"in" + j,
						);
						document.getElementById("inputName" + j).value = urlParams.get(
							"intitle" + j,
						);

						document.getElementById("inputName" + j).value = document
							.getElementById("inputName" + j)
							.value.replaceAll("^and^", "&")
							.replaceAll("^percent^", "%")
							.replaceAll("^hash^", "#");
					}
				}

				FirstStartTimeout();
			}

			function FirstStartTimeout() {
				setTimeout(() => {
					if (playerready) {
						dontplay = true;
						StartVideo(currentVideo, false, startxtime);
						RestartCheck();
					} else {
						FirstStartTimeout();
					}
				}, 100);
			}

			function InitInputs(sc = 3) {
				for (let i = 0; i < sc; i++) {
					j = i;
					Add();
				}
			}
			function LoadTime() {
				$(".ibutton2").blur();

				player.seekTo(startxtime);

				const urlParams = new URLSearchParams(window.location.search);

				if (urlParams.has("time") == true) {
					startxtime = parseInt(urlParams.get("time"));
				}
			}
		</script>
